services:
  - type: web
    name: intl-business-backend
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: CLIENT_URL
        value: https://intl-business.vercel.app
      - key: SUPABASE_URL
        fromDatabase:
          name: supabase_url
      - key: SUPABASE_SERVICE_ROLE_KEY
        fromDatabase:
          name: supabase_service_role_key
      - key: SUPABASE_ANON_KEY
        fromDatabase:
          name: supabase_anon_key
      - key: JWT_SECRET
        fromDatabase:
          name: jwt_secret
